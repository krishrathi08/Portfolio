<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant modern tech gradient -->
    <linearGradient id="kr-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B60F4" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
    
    <!-- Premium drop shadow filter for dark/light contrast -->
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7B60F4" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Transparent background container -->
  <rect width="512" height="512" fill="none" />

  <g filter="url(#premium-shadow)">
    <!-- Main stem of K and R -->
    <path d="M 170 110 L 170 402" 
          stroke="url(#kr-gradient)" 
          stroke-width="48" 
          stroke-linecap="round" 
          fill="none" />

    <!-- K Top Diagonal -->
    <path d="M 170 256 L 280 146" 
          stroke="url(#kr-gradient)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />

    <!-- K Bottom Diagonal -->
    <path d="M 170 256 L 280 366" 
          stroke="url(#kr-gradient)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />

    <!-- R Upper Loop (connecting top of stem to middle of stem with a beautiful curve) -->
    <path d="M 170 110 H 250 C 320 110 320 256 250 256 H 170" 
          stroke="url(#kr-gradient)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />

    <!-- R Lower Leg (starts from middle of stem and sweeps down-right slightly wider) -->
    <path d="M 230 256 L 310 392" 
          stroke="url(#kr-gradient)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />
  </g>
</svg>
